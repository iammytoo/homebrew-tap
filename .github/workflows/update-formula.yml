name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update juubako formula
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          SHA256="${{ github.event.client_payload.sha256 }}"

          cat > Formula/juubako.rb << RUBY
          class Juubako < Formula
            desc "Local PR review tool for AI-assisted development"
            homepage "https://github.com/iammytoo/juubako"
            version "${VERSION}"

            url "https://github.com/iammytoo/juubako/releases/download/v#{version}/juubako-aarch64-apple-darwin.tar.gz"
            sha256 "${SHA256}"

            depends_on arch: :arm64

            def install
              bin.install "juubako"
              bin.install_symlink "juubako" => "jbk"
            end
          end
          RUBY

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/juubako.rb
          git commit -m "juubako ${{ github.event.client_payload.version }}"
          git push
